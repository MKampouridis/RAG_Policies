<title>Essex Policies & Rules of Assessment Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --fg: #1a1a1a;
    --muted: #6b6b6b;
    --border: #e0e0e0;
    --accent: #2f5fd9;
    --bubble-user: #2f5fd9;
    --bubble-user-fg: #ffffff;
    --bubble-assistant: #f2f2f4;
    --sidebar-bg: #fafafa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16171a;
      --fg: #e8e8e8;
      --muted: #9a9a9a;
      --border: #2c2d31;
      --accent: #6d8cff;
      --bubble-user: #3a5bc7;
      --bubble-user-fg: #ffffff;
      --bubble-assistant: #232428;
      --sidebar-bg: #1c1d21;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--fg);
    height: 100vh;
    display: flex;
  }
  #sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sidebar-header {
    padding: 14px;
    border-bottom: 1px solid var(--border);
  }
  #new-chat-btn {
    width: 100%;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--accent);
    color: white;
    font-size: 14px;
    cursor: pointer;
  }
  #conversation-list {
    overflow-y: auto;
    flex: 1;
  }
  .conv-item {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    font-size: 13px;
    color: var(--fg);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .conv-item:hover { background: var(--bubble-assistant); }
  .conv-item.active { background: var(--bubble-assistant); font-weight: 600; }
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  #header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    font-weight: 600;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg-row { display: flex; }
  .msg-row.user { justify-content: flex-end; }
  .bubble {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 14px;
    white-space: pre-wrap;
    line-height: 1.45;
    font-size: 14px;
  }
  .msg-row.user .bubble { background: var(--bubble-user); color: var(--bubble-user-fg); }
  .msg-row.assistant .bubble { background: var(--bubble-assistant); color: var(--fg); }
  .sources {
    margin-top: 8px;
    font-size: 12px;
    color: var(--muted);
  }
  .sources a { color: var(--accent); word-break: break-all; }
  #composer {
    display: flex;
    gap: 10px;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
  }
  #composer textarea {
    flex: 1;
    resize: none;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--fg);
    font-size: 14px;
    font-family: inherit;
  }
  #composer button {
    padding: 0 20px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    font-size: 14px;
    cursor: pointer;
  }
  #composer button:disabled { opacity: 0.5; cursor: default; }
  .empty-state {
    margin: auto;
    color: var(--muted);
    text-align: center;
    font-size: 14px;
  }
</style>

<div id="sidebar">
  <div id="sidebar-header">
    <button id="new-chat-btn">+ New conversation</button>
  </div>
  <div id="conversation-list"></div>
</div>

<div id="main">
  <div id="header">Essex Policies &amp; Rules of Assessment Assistant</div>
  <div id="messages"><div class="empty-state">Start a new conversation or pick one from the sidebar.</div></div>
  <div id="composer">
    <textarea id="input" rows="1" placeholder="Ask about a policy or rule of assessment..."></textarea>
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
  let activeConversationId = null;

  const conversationList = document.getElementById('conversation-list');
  const messagesEl = document.getElementById('messages');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  const newChatBtn = document.getElementById('new-chat-btn');

  async function fetchJSON(url, options) {
    const res = await fetch(url, options);
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function renderMessage(role, content, sources) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;
    row.appendChild(bubble);
    if (sources && sources.length) {
      const src = document.createElement('div');
      src.className = 'sources';
      src.innerHTML = 'Sources:<br>' + sources.map(
        u => `<a href="${u}" target="_blank" rel="noopener">${escapeHtml(u)}</a>`
      ).join('<br>');
      bubble.appendChild(src);
    }
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function loadConversations() {
    const convs = await fetchJSON('/api/conversations');
    conversationList.innerHTML = '';
    for (const c of convs) {
      const item = document.createElement('div');
      item.className = 'conv-item' + (c.id === activeConversationId ? ' active' : '');
      item.textContent = c.title;
      item.onclick = () => openConversation(c.id);
      conversationList.appendChild(item);
    }
  }

  async function openConversation(id) {
    activeConversationId = id;
    messagesEl.innerHTML = '';
    const msgs = await fetchJSON(`/api/conversations/${id}/messages`);
    if (!msgs.length) {
      messagesEl.innerHTML = '<div class="empty-state">No messages yet — ask a question below.</div>';
    }
    for (const m of msgs) {
      renderMessage(m.role, m.content);
    }
    await loadConversations();
  }

  newChatBtn.onclick = async () => {
    const conv = await fetchJSON('/api/conversations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
    });
    await openConversation(conv.id);
  };

  async function send() {
    const text = input.value.trim();
    if (!text) return;

    if (!activeConversationId) {
      const conv = await fetchJSON('/api/conversations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({}),
      });
      activeConversationId = conv.id;
    }

    if (messagesEl.querySelector('.empty-state')) messagesEl.innerHTML = '';
    renderMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    const thinkingRow = document.createElement('div');
    thinkingRow.className = 'msg-row assistant';
    thinkingRow.innerHTML = '<div class="bubble">Thinking…</div>';
    messagesEl.appendChild(thinkingRow);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const result = await fetchJSON(`/api/conversations/${activeConversationId}/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: text }),
      });
      thinkingRow.remove();
      renderMessage('assistant', result.answer, result.sources);
      await loadConversations();
    } catch (err) {
      thinkingRow.remove();
      renderMessage('assistant', 'Error: ' + err.message);
    } finally {
      sendBtn.disabled = false;
    }
  }

  sendBtn.onclick = send;
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  loadConversations();
</script>
